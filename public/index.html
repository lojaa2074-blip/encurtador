<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encurtador de Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a6b4a;
      --green-light: #2d9c6e;
      --green-pale: #e8f5ef;
      --green-mid: #c2e8d5;
      --bg: #f0f7f3;
      --white: #ffffff;
      --gray: #6b7280;
      --dark: #111827;
      --radius: 18px;
      --shadow: 0 8px 40px rgba(26,107,74,0.13);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #2d9c6e, transparent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #a8d5be, transparent);
      bottom: -80px; right: -80px;
    }

    .card {
      background: var(--white);
      border-radius: 28px;
      padding: 44px 36px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
      animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-wrap {
      width: 60px; height: 60px;
      background: var(--green-pale);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .icon-wrap svg { width: 28px; height: 28px; stroke: var(--green); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--green);
      text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: var(--gray);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    textarea {
      width: 100%;
      min-height: 110px;
      padding: 16px;
      border: 2px solid var(--green-mid);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--dark);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--green-pale);
      line-height: 1.5;
    }
    textarea::placeholder { color: #aab8b0; }
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(26,107,74,0.1);
      background: #fff;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
      box-shadow: 0 4px 18px rgba(26,107,74,0.3);
    }
    .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(26,107,74,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--green-mid);
      color: var(--green);
      margin-top: 10px;
    }
    .btn-outline:hover { border-color: var(--green); background: var(--green-pale); }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      margin-top: 10px;
      box-shadow: 0 4px 18px rgba(37,211,102,0.3);
    }
    .btn-whatsapp:hover { background: #1fba58; transform: translateY(-1px); }

    .result-box {
      display: none;
      margin-top: 22px;
      animation: fadeIn 0.35s ease both;
    }
    .result-box.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray);
      margin-bottom: 8px;
    }

    .result-url {
      background: var(--green-pale);
      border: 2px solid var(--green-mid);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.88rem;
      color: var(--green);
      font-weight: 500;
      word-break: break-all;
      line-height: 1.5;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 99;
      transition: transform 0.35s cubic-bezier(.22,.68,0,1.2);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .error-msg {
      color: #dc2626;
      font-size: 0.83rem;
      margin-top: 8px;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #d1fae5; color: #065f46;
      padding: 6px 14px; border-radius: 50px;
      font-size: 0.82rem; font-weight: 600;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
  </div>

  <h1>Encurtador</h1>
  <p class="subtitle">Cole o link da assinatura digital abaixo</p>

  <div class="input-wrap">
    <textarea id="urlInput" placeholder="https://..."></textarea>
  </div>
  <p class="error-msg" id="errorMsg">Por favor, cole um link válido.</p>

  <button class="btn btn-primary" id="encurtarBtn" onclick="encurtar()">
    <span id="btnText">GERAR LINK</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="result-box" id="resultBox">
    <div class="success-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      LINK GERADO!
    </div>
    <p class="result-label">Link encurtado</p>
    <div class="result-url" id="shortUrl"></div>

    <button class="btn btn-outline" onclick="copiar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      COPIAR LINK
    </button>

    <button class="btn btn-whatsapp" onclick="whatsapp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
      ENVIAR NO WHATSAPP
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwUcdVP2N45j4MnH-hIJKZuqOKBHUJZSA",
    authDomain: "encurtador-957e6.firebaseapp.com",
    projectId: "encurtador-957e6",
    storageBucket: "encurtador-957e6.firebasestorage.app",
    messagingSenderId: "332190201263",
    appId: "1:332190201263:web:60b3b952a97b415eae2b5a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Gera código curto aleatório (6 chars)
  function gerarCodigo() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  window.encurtar = async function() {
    const input = document.getElementById('urlInput');
    const url = input.value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const resultBox = document.getElementById('resultBox');
    const btn = document.getElementById('encurtarBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    // Validação
    if (!url || !url.startsWith('http')) {
      errorMsg.classList.add('show');
      input.focus();
      return;
    }
    errorMsg.classList.remove('show');
    resultBox.classList.remove('show');

    // Loading
    btn.disabled = true;
    btnText.textContent = 'GERANDO...';
    spinner.style.display = 'block';

    try {
      const codigo = gerarCodigo();
      const baseUrl = window.location.origin;
      const shortLink = `${baseUrl}/r/${codigo}`;

      // Salva no Firestore
      await setDoc(doc(db, 'links', codigo), {
        url: url,
        codigo: codigo,
        criado: new Date().toISOString()
      });

      // Mostra resultado
      document.getElementById('shortUrl').textContent = shortLink;
      window._shortLink = shortLink;
      resultBox.classList.add('show');
      showToast('✅ Link gerado com sucesso!');

    } catch (err) {
      console.error(err);
      showToast('❌ Erro ao gerar link. Verifique o Firebase.');
    } finally {
      btn.disabled = false;
      btnText.textContent = 'GERAR LINK';
      spinner.style.display = 'none';
    }
  };

  window.copiar = function() {
    const link = window._shortLink || document.getElementById('shortUrl').textContent;
    navigator.clipboard.writeText(link).then(() => showToast('📋 Link copiado!'));
  };

  window.whatsapp = function() {
    const link = window._shortLink || document.getElementById('shortUrl').textContent;
    const msg = encodeURIComponent(`Olá, segue o link para a assinatura digital:\n${link}`);
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  };

  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  };
</script>

<!-- Redirect handler: /r/CODIGO -->
<script>
  // Se estiver acessando /r/CODIGO, faz redirect
  const path = window.location.pathname;
  const match = path.match(/^\/r\/([a-z0-9]{6})$/);
  if (match) {
    document.body.innerHTML = '<div style="font-family:sans-serif;text-align:center;padding:60px;color:#1a6b4a;font-size:1.1rem">🔗 Redirecionando...</div>';
    // O redirect real é feito pela Netlify Function (redirect.js)
  }
</script>

</body>
</html>
